name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # TEST-ONLY. The skill's scripts are stdlib-only; PyYAML is installed solely so the
      # frontmatter differential test (tests/test_frontmatter.py) can run its ground-truth
      # comparison against yaml.safe_load. Without it that test SKIPS silently, which would
      # quietly retire our only check that frontmatter.py still matches PyYAML's semantics.
      - name: Install test-only dependencies
        run: pip install -r skill-creator-plus/skills/skill-creator-plus/scripts/requirements.txt

      - name: Syntax check bundled scripts
        run: |
          for f in skill-creator-plus/skills/skill-creator-plus/scripts/*.py; do
            python -c "import py_compile; py_compile.compile('$f', doraise=True)"
            echo "OK: $f"
          done

      - name: Validate skill structure
        run: |
          python skill-creator-plus/skills/skill-creator-plus/scripts/quick_validate.py \
            skill-creator-plus/skills/skill-creator-plus

      - name: Run unit tests
        run: |
          cd skill-creator-plus/skills/skill-creator-plus
          python -m unittest discover -s tests -v

      - name: Check version consistency
        run: |
          ROOT_VERSION=$(cat VERSION | tr -d '[:space:]')
          PLUGIN_VERSION=$(python3 -c "import json; print(json.load(open('skill-creator-plus/.claude-plugin/plugin.json'))['version'])")
          if [ "$ROOT_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "Version mismatch: VERSION=$ROOT_VERSION, plugin.json=$PLUGIN_VERSION"
            exit 1
          fi
          echo "Version consistent: $ROOT_VERSION"
