name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build zip for Claude.ai upload
        run: |
          mkdir -p dist
          cp -r skill-creator-plus/skills/skill-creator-plus dist/skill-creator-plus
          echo "${{ steps.version.outputs.version }}" > dist/skill-creator-plus/VERSION
          # Package via the project's own packager so exclusions (tests/,
          # __pycache__, evals/, symlinks) apply to the published artifact too.
          cd skill-creator-plus/skills/skill-creator-plus
          python -m scripts.package_skill "$GITHUB_WORKSPACE/dist/skill-creator-plus" "$GITHUB_WORKSPACE"
          mv "$GITHUB_WORKSPACE/skill-creator-plus.skill" "$GITHUB_WORKSPACE/skill-creator-plus.zip"

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            skill-creator-plus.zip
